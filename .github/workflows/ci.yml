name: Pipeline CI-CD Smart Network

on:
  push:
    branches: [ main ]

jobs:
  # المربع الأول: فحص
  Preparation:
    name: Intégration Continue (CI)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Validation
        run: echo "Code source récupéré. Prêt pour Docker."

  # المربع الثاني: بناء Docker
  Build:
    name: Construction Docker
    needs: Preparation
    runs-on: self-hosted
    steps:
      - name: Build Docker Image
        run: docker build -t network-app .

  # المربع الثالث: النشر المحلي
  Deploy:
    name: Déploiement CD (Local)
    needs: Build
    runs-on: self-hosted
    steps:
      - name: Run Container
        run: |
          docker stop network-app || true
          docker rm network-app || true
          docker run -d --name network-app -p 5000:5000 network-app

  # المربع الرابع: النشر على Render
  Deploy_Render:
    name: Déploiement sur Render
    needs: Deploy
    runs-on: self-hosted
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}"
