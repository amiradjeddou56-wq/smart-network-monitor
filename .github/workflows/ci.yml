name: Pipeline CI/CD - Smart Network Monitor

on:
  push:
    branches: [ main ]

jobs:
  # المربع الأول: فحص الكود (CI)
  integration:
    name: Intégration Continue (CI)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Installation des dépendances
        run: pip install -r requirements.txt

  # المربع الثاني: بناء الحاوية (Docker Build)
  build:
    name: Construction Docker
    needs: integration # هذا يجعله ينتظر المربع الأول
    runs-on: self-hosted
    steps:
      - name: Build Docker Image
        run: docker build -t network-app .

  # المربع الثالث: النشر (CD)
  deploy:
    name: Déploiement CD
    needs: build # هذا يجعله ينتظر المربع الثاني
    runs-on: self-hosted
    steps:
      - name: Stop and Run Container
        run: |
          docker stop network-app || true
          docker rm network-app || true
          docker run -d --name network-app -p 5000:5000 network-app