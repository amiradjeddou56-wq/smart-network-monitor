name: Pipeline CI-CD Smart Network

on:
  push:
    branches: [ main ]

jobs:
  # المربع الأول: فحص الكود (لن نستخدم pip هنا لتجنب الخطأ)
  Preparation:
    name: Intégration Continue (CI)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Validation du code
        run: echo "Code récupéré avec succès. Prêt pour Docker."

  # المربع الثاني: بناء Docker (هنا يتم تثبيت المكتبات بداخل الحاوية)
  Build:
    name: Construction Docker
    needs: Preparation
    runs-on: self-hosted
    steps:
      - name: Build Image
        run: docker build -t network-app .

  # المربع الثالث: النشر النهائي (الذي يظهر التطبيق في المتصفح)
  Deploy:
    name: Déploiement CD
    needs: Build
    runs-on: self-hosted
    steps:
      - name: Nettoyage et Lancement
        run: |
          docker stop network-app || true
          docker rm network-app || true
          docker run -d --name network-app -p 5000:5000 network-app