name: PFE Smart Network Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # تحديث الكود وتشغيل الحاوية تلقائياً
            docker stop network-app || true
            docker rm network-app || true
            docker build -t smart-monitor .
            docker run -d --name network-app -p 5000:5000 smart-monitor