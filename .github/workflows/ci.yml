name: Pipeline CI-CD Smart Network

on:
  push:
    branches: [ main ]  # تأكدي أن اسم الفرع عندك هو main وليس master

jobs:
  # المربع الأول: فحص أولي
  Preparation:
    name: Intégration Continue (CI)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Check Environment
        run: echo "Démarrage du pipeline sur Ubuntu..."

  # المربع الثاني: بناء Docker
  Build:
    name: Construction Docker
    needs: Preparation  # هذا هو السر لربط المربعات ببعضها
    runs-on: self-hosted
    steps:
      - name: Build Image
        run: docker build -t network-app .

  # المربع الثالث: التشغيل النهائي
  Deploy:
    name: Déploiement CD
    needs: Build
    runs-on: self-hosted
    steps:
      - name: Deploy Container
        run: |
          docker stop network-app || true
          docker rm network-app || true
          docker run -d --name network-app -p 5000:5000 network-app