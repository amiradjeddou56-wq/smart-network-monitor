<!DOCTYPE html>
<html>
<head>
    <title>Smart Network Monitor</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        p {
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #00c6ff;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            transform: scale(1.1);
        }
    </style>

</head>
<body>

<div class="container">
    <h1>🚀 Smart Network Monitor</h1>
    <p>Surveillance intelligente des équipements réseau</p>

    <a href="/dashboard" class="btn">Entrer au Dashboard</a>
</div>

</body>
</html>
