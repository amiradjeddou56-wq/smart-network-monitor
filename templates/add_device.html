<!DOCTYPE html>
<html>
<head>
<title>Add Device</title>

<style>
body { background:#121212; color:white; text-align:center; font-family:Arial; }
input { display:block; margin:10px auto; padding:10px; width:250px; }
button { padding:10px 20px; background:#00c6ff; color:white; border:none; }
</style>

</head>
<body>

<h1>➕ Add Device</h1>

<form method="POST">
<input name="name" placeholder="Name">
<input name="ip" placeholder="IP">
<input name="port" placeholder="Port">
<input name="type" placeholder="Type (Routeur/Switch)">
<input name="location" placeholder="Location">
<input name="vendor" placeholder="Vendor">
<input name="description" placeholder="Description">

<button type="submit">Add</button>
</form>

</body>
</html>
