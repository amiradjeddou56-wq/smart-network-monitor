<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { background:#121212; color:white; text-align:center; font-family:Arial; }
        input { display:block; margin:10px auto; padding:10px; width:250px; }
        button { padding:10px 20px; background:#00c6ff; border:none; color:white; }
    </style>
</head>
<body>

<h1>🔐 Login</h1>

<form method="POST">
    <input name="username" placeholder="Username">
    <input name="password" type="password" placeholder="Password">
    <button type="submit">Login</button>
</form>

</body>
</html>
